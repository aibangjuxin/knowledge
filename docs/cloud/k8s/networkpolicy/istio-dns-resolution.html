<!DOCTYPE html>
<html lang="en">
<head>

<title>Istio DNS Resolution — ServiceEntry Internal Routing</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-paper: #f5f4ed;
  --color-ink: #0b0d0b;
  --color-muted: #52534e;
  --color-accent: #f7591f;
  --font-sans: 'Geist', system-ui, sans-serif;
  --font-serif: 'Instrument Serif', serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
}
body {
  font-family: var(--font-sans);
  background: var(--color-paper);
  color: var(--color-ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
}
.frame { max-width: 1200px; width: 100%; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-muted);
  margin-bottom: 0.5rem;
}
h1 {
  font-family: var(--font-serif);
  font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--color-ink);
  margin-bottom: 1.5rem;
}
svg { width: 100%; min-width: 900px; display: block; }
</style>
</head>
<body>
<div class="frame">
<p class="eyebrow">Architecture · GKE / Istio</p>
<h1>Pod DNS Resolution: Default Path vs. ServiceEntry</h1>

<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">

<marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f7591f"/></marker>
<marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/></marker>
<marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#78716c"/></marker>
</defs>

<rect width="100%" height="100%" fill="#f5f4ed"/>
<rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

<!-- VPC Boundary Left -->

<text x="56" y="76" fill="#78716c" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.1em">VPC BOUNDARY</text>

<text x="260" y="112" fill="#0b0d0b" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Default: DNS goes public</text>
<text x="740" y="112" fill="#0b0d0b" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Optimal: ServiceEntry intercepts</text>
