<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 900px;
  height: 383px;
  background: linear-gradient(135deg, #0a3d62 0%, #1e5f74 100%);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden;
  position: relative;
}
.layer {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  text-align: center;
}
.tag {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #133b5c;
  opacity: 0.9;
  margin-bottom: 16px;
  border: 1px solid #133b5c;
  padding: 4px 14px;
  border-radius: 20px;
  display: inline-block;
}
.title {
  font-size: 34px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.4;
  max-width: 720px;
  text-shadow: 0 2px 24px rgba(0,0,0,0.4);
}
.subtitle {
  margin-top: 16px;
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
}
.corner {
  position: absolute;
  width: 100px;
  height: 100px;
  border: 1px solid #133b5c;
  opacity: 0.15;
}
.corner-tl { top: 24px; left: 24px; border-right: none; border-bottom: none; }
.corner-tr { top: 24px; right: 24px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 24px; left: 24px; border-right: none; border-top: none; }
.corner-br { bottom: 24px; right: 24px; border-left: none; border-top: none; }
.line-left, .line-right {
  position: absolute;
  top: 50%;
  width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, #133b5c);
  opacity: 0.4;
}
.line-left { left: 40px; }
.line-right {
  right: 40px;
  background: linear-gradient(to left, transparent, #133b5c);
}
</style>
</head>
<body>
<div class="layer">
  <div class="tag">技术文章</div>
  <div class="title">深入理解 GKE DNS 解析原理</div>
  <div class="subtitle">扫描二维码阅读全文 &rarr;</div>
</div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="line-left"></div>
<div class="line-right"></div>
</body>
</html>
