<svg width="1480" height="1020" viewBox="0 0 1480 1020" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gloo Gateway Ambient Flow</title>
  <desc id="desc">Optimized SVG diagram for ambient mesh showing external HTTPS ingress, Gloo Gateway TLS termination, ambient HBONE flow through ztunnel and waypoint, then delivery to a runtime pod without sidecar.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f3640"/>
      <stop offset="100%" stop-color="#202833"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7456ff"/>
      <stop offset="100%" stop-color="#4f6bff"/>
    </linearGradient>
    <linearGradient id="controlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#142132"/>
      <stop offset="100%" stop-color="#2a3d57"/>
    </linearGradient>
    <linearGradient id="ambientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12b886"/>
      <stop offset="100%" stop-color="#0b8fb5"/>
    </linearGradient>
    <linearGradient id="waypointGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f8fb1"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8ad"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.14"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d8dee8"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#246bce"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#0f9f82"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#117fa1"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#c98a00"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1480" height="1020" fill="url(#bg)"/>
  <rect width="1480" height="1020" fill="url(#dots)" opacity="0.33"/>

  <text x="56" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="800" fill="#162131">
    Gloo Gateway Follow Flow · Ambient Mesh
  </text>
  <text x="56" y="90" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#556274">
    Runtime pods stay sidecarless while L4 security moves to ztunnel and L7 policy moves to waypoint proxy
  </text>

  <rect x="52" y="122" width="1376" height="752" rx="28" fill="#ffffff" stroke="#d8dee8" stroke-width="1.5" filter="url(#softShadow)"/>

  <rect x="78" y="150" width="280" height="162" rx="22" fill="url(#publicGrad)" filter="url(#softShadow)"/>
  <text x="102" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#c5cedb">ZONE 1 · EXTERNAL</text>
  <rect x="102" y="206" width="232" height="78" rx="16" fill="#3b4351" stroke="#677385" stroke-width="1.2"/>
  <text x="218" y="236" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">External Client</text>
  <text x="218" y="259" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#cfd6e3">HTTPS *.team-a.appdev.aibang</text>

  <rect x="412" y="150" width="336" height="162" rx="22" fill="url(#gatewayGrad)" filter="url(#softShadow)"/>
  <text x="436" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#e7e4ff">ZONE 2 · NAMESPACE gloo-gateway</text>
  <rect x="438" y="206" width="284" height="80" rx="16" fill="#f7f5ff" stroke="#d0c8ff" stroke-width="1.5"/>
  <text x="580" y="234" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800" fill="#392d82">Gloo Gateway Pod</text>
  <text x="580" y="255" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5d56a5">Envoy-based · VirtualGateway TLS SIMPLE termination</text>
  <text x="580" y="274" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#655cb8">wildcard cert · SPIFFE identity · ambient mesh source</text>

  <rect x="792" y="150" width="610" height="248" rx="22" fill="url(#controlGrad)" filter="url(#softShadow)"/>
  <text x="818" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ccdae8">CONTROL PLANE</text>

  <rect x="820" y="212" width="170" height="120" rx="18" fill="#213349" stroke="#4d6684" stroke-width="1.2"/>
  <text x="905" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">mgmt-server</text>
  <text x="905" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#b7c8db">Management Cluster</text>
  <text x="905" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9ec5f8">RootTrustPolicy unified CA</text>

  <rect x="1012" y="212" width="170" height="120" rx="18" fill="#213349" stroke="#4d6684" stroke-width="1.2"/>
  <text x="1097" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">gloo-mesh-agent</text>
  <text x="1097" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#b7c8db">Workload Cluster</text>
  <text x="1097" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9ec5f8">gRPC relay client</text>

  <rect x="1204" y="212" width="170" height="120" rx="18" fill="#213349" stroke="#4d6684" stroke-width="1.2"/>
  <text x="1289" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">istiod</text>
  <text x="1289" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#b7c8db">ambient control plane</text>
  <text x="1289" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9ec5f8">ztunnel + waypoint config and certs</text>

  <rect x="78" y="360" width="1324" height="482" rx="24" fill="#f6fbfa" stroke="#c6ebe1" stroke-width="1.5"/>
  <text x="104" y="392" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0d7f68">ZONE 3 · NAMESPACE team-a-runtime · AMBIENT DATA PLANE</text>

  <rect x="104" y="430" width="242" height="312" rx="20" fill="#ffffff" stroke="#bfe4d9" stroke-width="1.4"/>
  <text x="128" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#156f60">Layered Policy Gates</text>

  <rect x="128" y="490" width="194" height="62" rx="14" fill="#effaf6" stroke="#81d4bd" stroke-width="1.2"/>
  <text x="225" y="514" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f8a6f">NetworkPolicy</text>
  <text x="225" y="536" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#2e675d">L3/L4 allow ambient ingress path</text>

  <rect x="128" y="573" width="194" height="62" rx="14" fill="#eff7ff" stroke="#90c2ff" stroke-width="1.2"/>
  <text x="225" y="597" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d63c1">Ambient mTLS</text>
  <text x="225" y="619" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#355a8d">HBONE via ztunnel</text>

  <rect x="128" y="656" width="194" height="62" rx="14" fill="#fff7ea" stroke="#f0c36b" stroke-width="1.2"/>
  <text x="225" y="680" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#a86a00">AccessPolicy</text>
  <text x="225" y="702" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#7f6325">L7 allow at waypoint</text>

  <rect x="390" y="430" width="972" height="312" rx="20" fill="#ffffff" stroke="#d7ece7" stroke-width="1.4"/>
  <text x="418" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#1d2d35">Sidecarless Runtime Delivery Path</text>

  <rect x="428" y="506" width="258" height="162" rx="24" fill="url(#ambientGrad)" filter="url(#softShadow)"/>
  <text x="557" y="536" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#d9fff5">NODE L4 PLANE</text>
  <text x="557" y="572" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">ztunnel</text>
  <text x="557" y="598" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#e8fffb">Captures ambient traffic · terminates and originates HBONE</text>
  <text x="557" y="622" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#d6fffa">Node-level L4 security and identity</text>

  <rect x="750" y="506" width="258" height="162" rx="24" fill="url(#waypointGrad)" filter="url(#softShadow)"/>
  <text x="879" y="536" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#dbeafe">NAMESPACE L7 PLANE</text>
  <text x="879" y="572" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Waypoint Proxy</text>
  <text x="879" y="598" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#eff6ff">Applies L7 routing and AccessPolicy for team-a runtime</text>
  <text x="879" y="622" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#dbeafe">Only needed when L7 policy is required</text>

  <rect x="1072" y="506" width="250" height="162" rx="24" fill="url(#appGrad)" filter="url(#softShadow)"/>
  <text x="1197" y="536" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#886100">WORKLOAD POD</text>
  <text x="1197" y="572" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#5e4900">Business App Pod</text>
  <text x="1197" y="598" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#7a5c00">No sidecar injected</text>
  <text x="1197" y="622" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#866a15">App receives delivered traffic as a normal pod</text>

  <path d="M 358 230 C 380 230, 394 230, 412 230" fill="none" stroke="#246bce" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <rect x="366" y="190" width="110" height="28" rx="7" fill="#f7f9fc"/>
  <text x="421" y="209" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#246bce">① HTTPS / TLS</text>
  <text x="418" y="328" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Wildcard business certificate terminates at Gloo Gateway</text>

  <path d="M 580 312 C 580 406, 580 430, 556 506" fill="none" stroke="#0f9f82" stroke-width="6" marker-end="url(#arrowGreen)"/>
  <rect x="502" y="352" width="158" height="32" rx="8" fill="#f7f9fc"/>
  <text x="581" y="373" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#0f9f82">② HBONE / mTLS</text>
  <text x="612" y="394" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Gateway enters ambient data plane without per-pod sidecar</text>

  <path d="M 686 587 C 710 587, 724 587, 750 587" fill="none" stroke="#117fa1" stroke-width="5" marker-end="url(#arrowTeal)"/>
  <rect x="692" y="547" width="126" height="28" rx="7" fill="#f7f9fc"/>
  <text x="755" y="566" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#117fa1">③ L7 hop</text>
  <text x="718" y="693" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Traffic is elevated to waypoint only when namespace or service needs L7 policy</text>

  <path d="M 1008 587 C 1032 587, 1042 587, 1072 587" fill="none" stroke="#c98a00" stroke-width="5" marker-end="url(#arrowGold)"/>
  <rect x="1012" y="547" width="134" height="28" rx="7" fill="#f7f9fc"/>
  <text x="1079" y="566" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#c98a00">④ deliver</text>
  <text x="1048" y="693" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Runtime pod stays plain and sidecarless while ambient handles the mesh work</text>

  <path d="M 990 272 C 1002 272, 1006 272, 1012 272" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowMuted)"/>
  <path d="M 1182 272 C 1192 272, 1198 272, 1204 272" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowMuted)"/>
  <rect x="1035" y="178" width="126" height="28" rx="7" fill="#1d2b3f"/>
  <text x="1098" y="197" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#bcd8ff">gRPC relay</text>

  <path d="M 1289 332 C 1289 388, 1289 408, 1142 448 C 984 490, 770 492, 620 528" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowMuted)"/>
  <path d="M 1289 332 C 1289 394, 1289 408, 1208 440 C 1124 473, 965 516, 942 530" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowMuted)"/>
  <path d="M 1289 332 C 1289 426, 1289 458, 1289 506" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowMuted)"/>
  <rect x="1130" y="430" width="128" height="28" rx="7" fill="#ffffff"/>
  <text x="1194" y="449" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5b6677">xDS + SDS</text>

  <path d="M 346 520 C 382 520, 402 528, 428 552" fill="none" stroke="#5ebba5" stroke-width="2.5" stroke-dasharray="5 5" marker-end="url(#arrowGreen)"/>
  <path d="M 346 603 C 382 603, 402 592, 428 586" fill="none" stroke="#5d98dd" stroke-width="2.5" stroke-dasharray="5 5" marker-end="url(#arrowBlue)"/>
  <path d="M 346 686 C 382 686, 520 650, 750 610" fill="none" stroke="#d8a33a" stroke-width="2.5" stroke-dasharray="5 5" marker-end="url(#arrowGold)"/>

  <rect x="432" y="770" width="890" height="42" rx="12" fill="#f8fbff" stroke="#d6e7ff" stroke-width="1.1"/>
  <text x="877" y="797" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.2" fill="#4f5f73">
    Optional branch: if a destination does not need L7 policy, ambient traffic can stay at ztunnel-only L4 and skip waypoint.
  </text>

  <rect x="98" y="894" width="1284" height="98" rx="18" fill="#ffffff" stroke="#e0e6ee" stroke-width="1.2" filter="url(#softShadow)"/>
  <text x="126" y="924" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#3b4655">Reading Guide</text>

  <line x1="126" y1="950" x2="186" y2="950" stroke="#246bce" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="198" y="955" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">External HTTPS to Gateway</text>

  <line x1="432" y1="950" x2="492" y2="950" stroke="#0f9f82" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="504" y="955" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Gateway into ambient HBONE / mTLS</text>

  <line x1="786" y1="950" x2="846" y2="950" stroke="#117fa1" stroke-width="4" marker-end="url(#arrowTeal)"/>
  <text x="858" y="955" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">ztunnel to waypoint for L7 enforcement</text>

  <line x1="1118" y1="950" x2="1178" y2="950" stroke="#c98a00" stroke-width="4" marker-end="url(#arrowGold)"/>
  <text x="1190" y="955" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Delivered to sidecarless app pod</text>

  <text x="126" y="980" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#122233">
    Core takeaway:
  </text>
  <text x="232" y="980" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" fill="#445163">
    In the ambient model, the runtime pod is clean and sidecarless; transport security is provided by ztunnel, and L7 authorization is concentrated at the waypoint proxy when required.
  </text>
</svg>
