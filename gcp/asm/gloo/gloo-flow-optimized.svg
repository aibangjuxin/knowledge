<svg width="1440" height="980" viewBox="0 0 1440 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gloo Gateway to Runtime Pod Secure Flow</title>
  <desc id="desc">Optimized SVG diagram showing external HTTPS ingress, Gloo Gateway TLS termination, mesh mTLS to runtime sidecar, localhost hop to application container, plus control plane and policy layers.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f8fb"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>

    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f3640"/>
      <stop offset="100%" stop-color="#1f2530"/>
    </linearGradient>

    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7456ff"/>
      <stop offset="100%" stop-color="#4b63ff"/>
    </linearGradient>

    <linearGradient id="controlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#162131"/>
      <stop offset="100%" stop-color="#26384d"/>
    </linearGradient>

    <linearGradient id="meshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12b886"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.14"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d9dee7"/>
    </pattern>

    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#243244"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#246bce"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#0f9f82"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#c98a00"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1440" height="980" fill="url(#bg)"/>
  <rect width="1440" height="980" fill="url(#dots)" opacity="0.35"/>

  <text x="56" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="800" fill="#162131">
    Gloo Gateway Follow Flow
  </text>
  <text x="56" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#556274">
    External TLS termination, mesh mTLS hop, localhost handoff, control-plane distribution, and layered enforcement
  </text>

  <rect x="52" y="122" width="1336" height="700" rx="28" fill="#ffffff" stroke="#d8dee8" stroke-width="1.5" filter="url(#softShadow)"/>

  <rect x="78" y="150" width="280" height="160" rx="22" fill="url(#publicGrad)" filter="url(#softShadow)"/>
  <text x="102" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#c5cedb">ZONE 1 · EXTERNAL</text>
  <rect x="102" y="204" width="232" height="78" rx="16" fill="#3a4350" stroke="#657184" stroke-width="1.2"/>
  <text x="218" y="234" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">External Client</text>
  <text x="218" y="257" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#cfd6e3">HTTPS *.team-a.appdev.aibang</text>

  <rect x="412" y="150" width="340" height="160" rx="22" fill="url(#gatewayGrad)" filter="url(#softShadow)"/>
  <text x="436" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#e7e4ff">ZONE 2 · NAMESPACE gloo-gateway</text>
  <rect x="438" y="204" width="288" height="80" rx="16" fill="#f7f5ff" stroke="#cfc7ff" stroke-width="1.5"/>
  <text x="582" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800" fill="#392d82">Gloo Gateway Pod</text>
  <text x="582" y="253" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5d56a5">Envoy-based · VirtualGateway TLS SIMPLE termination</text>
  <text x="582" y="272" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#655cb8">wildcard-team-a-cert · SPIFFE identity · Gloo Mesh CA</text>

  <rect x="792" y="150" width="570" height="250" rx="22" fill="url(#controlGrad)" filter="url(#softShadow)"/>
  <text x="818" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ccdae8">CONTROL PLANE</text>

  <rect x="820" y="212" width="160" height="120" rx="18" fill="#213349" stroke="#4d6684" stroke-width="1.2"/>
  <text x="900" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">mgmt-server</text>
  <text x="900" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#b7c8db">Management Cluster</text>
  <text x="900" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9ec5f8">RootTrustPolicy unified CA</text>

  <rect x="997" y="212" width="160" height="120" rx="18" fill="#213349" stroke="#4d6684" stroke-width="1.2"/>
  <text x="1077" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">gloo-mesh-agent</text>
  <text x="1077" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#b7c8db">Workload Cluster</text>
  <text x="1077" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9ec5f8">gRPC relay client</text>

  <rect x="1174" y="212" width="160" height="120" rx="18" fill="#213349" stroke="#4d6684" stroke-width="1.2"/>
  <text x="1254" y="244" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">istiod</text>
  <text x="1254" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#b7c8db">ns: istio-system</text>
  <text x="1254" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9ec5f8">xDS + SDS config and certs</text>

  <rect x="78" y="360" width="1284" height="430" rx="24" fill="#f6fbfa" stroke="#c6ebe1" stroke-width="1.5"/>
  <text x="104" y="392" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0d7f68">ZONE 3 · NAMESPACE team-a-runtime</text>

  <rect x="104" y="430" width="242" height="292" rx="20" fill="#ffffff" stroke="#bfe4d9" stroke-width="1.4"/>
  <text x="128" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#156f60">Layered Policy Gates</text>

  <rect x="128" y="485" width="194" height="62" rx="14" fill="#effaf6" stroke="#81d4bd" stroke-width="1.2"/>
  <text x="225" y="509" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f8a6f">NetworkPolicy</text>
  <text x="225" y="531" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#2e675d">L3/L4 allow only tcp/8443</text>

  <rect x="128" y="568" width="194" height="62" rx="14" fill="#eff7ff" stroke="#90c2ff" stroke-width="1.2"/>
  <text x="225" y="592" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d63c1">PeerAuthentication</text>
  <text x="225" y="614" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#355a8d">STRICT mTLS</text>

  <rect x="128" y="651" width="194" height="62" rx="14" fill="#fff7ea" stroke="#f0c36b" stroke-width="1.2"/>
  <text x="225" y="675" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#a86a00">AccessPolicy</text>
  <text x="225" y="697" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#7f6325">allow gloo-gateway service account</text>

  <rect x="390" y="430" width="930" height="292" rx="20" fill="#ffffff" stroke="#d7ece7" stroke-width="1.4"/>
  <text x="418" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#1d2d35">Business Pod Data Plane</text>

  <rect x="430" y="496" width="364" height="160" rx="24" fill="url(#meshGrad)" filter="url(#softShadow)"/>
  <text x="612" y="528" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#d9fff5">MESH EDGE</text>
  <text x="612" y="565" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Runtime Envoy Sidecar</text>
  <text x="612" y="592" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#e8fffb">Receives mTLS · validates SPIFFE · enforces L7 policy</text>
  <text x="612" y="616" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#d6fffa">PeerAuthentication + AccessPolicy gate here</text>

  <rect x="888" y="496" width="370" height="160" rx="24" fill="url(#appGrad)" filter="url(#softShadow)"/>
  <text x="1073" y="528" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#886100">APP CONTAINER</text>
  <text x="1073" y="565" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#5e4900">Business App</text>
  <text x="1073" y="592" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#7a5c00">HTTP :8443 plaintext on localhost</text>
  <text x="1073" y="616" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#866a15">App remains unaware of mesh mTLS</text>

  <path d="M 358 230 C 380 230, 396 230, 412 230" fill="none" stroke="#246bce" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <rect x="366" y="190" width="110" height="28" rx="7" fill="#f7f8fb"/>
  <text x="421" y="209" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#246bce">① HTTPS / TLS</text>
  <text x="420" y="327" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Wildcard cert terminates at Gloo Gateway</text>

  <path d="M 582 310 C 582 402, 582 430, 582 486" fill="none" stroke="#0f9f82" stroke-width="6" marker-end="url(#arrowGreen)"/>
  <rect x="514" y="350" width="136" height="32" rx="8" fill="#f7f8fb"/>
  <text x="582" y="371" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#0f9f82">② mTLS hop</text>
  <text x="604" y="392" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Gateway directly initiates mesh mTLS to the workload sidecar</text>

  <path d="M 794 576 C 826 576, 850 576, 886 576" fill="none" stroke="#c98a00" stroke-width="5" marker-end="url(#arrowGold)"/>
  <rect x="810" y="536" width="110" height="28" rx="7" fill="#f7f8fb"/>
  <text x="865" y="555" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#c98a00">③ localhost</text>
  <text x="810" y="688" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Inside the pod boundary, traffic is local plaintext from sidecar to app</text>

  <path d="M 980 272 C 990 272, 995 272, 997 272" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowMuted)"/>
  <path d="M 1157 272 C 1167 272, 1172 272, 1174 272" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowMuted)"/>
  <rect x="1013" y="178" width="129" height="28" rx="7" fill="#1d2b3f"/>
  <text x="1077" y="197" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#bcd8ff">gRPC relay</text>

  <path d="M 1254 332 C 1254 390, 1254 406, 1184 446 C 1110 488, 860 500, 726 523" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowMuted)"/>
  <path d="M 1254 332 C 1254 382, 1254 390, 1120 410 C 982 430, 786 250, 652 248" fill="none" stroke="#93a5ba" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowMuted)"/>
  <rect x="1094" y="430" width="120" height="28" rx="7" fill="#ffffff"/>
  <text x="1154" y="449" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5b6677">xDS + SDS</text>

  <path d="M 346 516 C 382 516, 402 524, 430 548" fill="none" stroke="#5ebba5" stroke-width="2.5" stroke-dasharray="5 5" marker-end="url(#arrowGreen)"/>
  <path d="M 346 599 C 382 599, 402 592, 430 584" fill="none" stroke="#5d98dd" stroke-width="2.5" stroke-dasharray="5 5" marker-end="url(#arrowBlue)"/>
  <path d="M 346 682 C 382 682, 402 660, 430 620" fill="none" stroke="#d8a33a" stroke-width="2.5" stroke-dasharray="5 5" marker-end="url(#arrowGold)"/>

  <rect x="98" y="842" width="1244" height="94" rx="18" fill="#ffffff" stroke="#e0e6ee" stroke-width="1.2" filter="url(#softShadow)"/>
  <text x="126" y="872" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#3b4655">Reading Guide</text>

  <line x1="126" y1="896" x2="186" y2="896" stroke="#246bce" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="198" y="901" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">External HTTPS with business certificate</text>

  <line x1="510" y1="896" x2="570" y2="896" stroke="#0f9f82" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="582" y="901" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Gateway to sidecar mesh mTLS</text>

  <line x1="840" y1="896" x2="900" y2="896" stroke="#c98a00" stroke-width="4" marker-end="url(#arrowGold)"/>
  <text x="912" y="901" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Sidecar to app localhost plaintext</text>

  <line x1="1148" y1="896" x2="1208" y2="896" stroke="#6b7280" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#arrowMuted)"/>
  <text x="1220" y="901" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4e5f73">Control-plane config and certificate distribution</text>

  <text x="126" y="924" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#122233">
    Core takeaway:
  </text>
  <text x="232" y="924" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" fill="#445163">
    TLS ends at the gateway, trust is re-established as mesh mTLS to the runtime sidecar, and policy is enforced before the app sees local plaintext traffic.
  </text>
</svg>
