# A simple backend application
apiVersion: v1
kind: Namespace
metadata:
  name: sample-app
  labels:
    # This label enables Istio sidecar injection (Gloo Mesh uses Istio)
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
      - name: httpbin
        image: kennethreitz/httpbin
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: sample-app
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: httpbin
