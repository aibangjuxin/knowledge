# Replace the placeholder PEM blocks before applying in production.
# Keep this secret in istio-system so the egress gateway can load it with SDS.

apiVersion: v1
kind: Secret
metadata:
  name: saas2-client-credential
  namespace: istio-system
type: Opaque
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_CLIENT_CERTIFICATE_CHAIN
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_CLIENT_PRIVATE_KEY
    -----END PRIVATE KEY-----
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_SAAS2_CA_CERTIFICATE
    -----END CERTIFICATE-----
