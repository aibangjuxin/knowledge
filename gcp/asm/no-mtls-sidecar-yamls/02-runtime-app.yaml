apiVersion: v1
kind: ServiceAccount
metadata:
  name: team-a-service-sa
  namespace: team-a-runtime
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-a-service
  namespace: team-a-runtime
  labels:
    app: team-a-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-a-service
  template:
    metadata:
      labels:
        app: team-a-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: team-a-service-sa
      containers:
      - name: app
        image: your-app-image:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: https-app
          containerPort: 8443
        env:
        - name: HTTPS_PORT
          value: "8443"
        - name: TLS_CERT_FILE
          value: /etc/tls/tls.crt
        - name: TLS_KEY_FILE
          value: /etc/tls/tls.key
        readinessProbe:
          httpGet:
            scheme: HTTPS
            path: /health
            port: 8443
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            scheme: HTTPS
            path: /health
            port: 8443
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: app-tls
          mountPath: /etc/tls
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 512Mi
      volumes:
      - name: app-tls
        secret:
          secretName: team-a-app-local-tls
---
apiVersion: v1
kind: Service
metadata:
  name: team-a-service
  namespace: team-a-runtime
spec:
  selector:
    app: team-a-service
  ports:
  - name: https-app
    port: 8443
    targetPort: 8443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: team-a-service
  namespace: team-a-runtime
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: team-a-service
