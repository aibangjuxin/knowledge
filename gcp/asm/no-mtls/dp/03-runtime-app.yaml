# ============================================================
# 03-runtime-app.yaml
# TLS Secret + ConfigMap + Deployment + Service for runtime app
# Runtime namespace: NO sidecar injection
# Certificate: *.env0-region-runtimepod.teama-nosidecare-rt-ns-int.svc.cluster.local
# ============================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: env0-region-runtimepod-tls
  namespace: teama-nosidecare-rt-ns-int
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-https-config
  namespace: teama-nosidecare-rt-ns-int
data:
  default.conf: |
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            return 200 'env0-region-runtimepod response';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: env0-region-runtimepod
  namespace: teama-nosidecare-rt-ns-int
  labels:
    app: env0-region-runtimepod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: env0-region-runtimepod
  template:
    metadata:
      labels:
        app: env0-region-runtimepod
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - name: https-app
          containerPort: 8443
          protocol: TCP
        volumeMounts:
        - name: app-tls
          mountPath: /etc/nginx/tls
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: app-tls
        secret:
          secretName: env0-region-runtimepod-tls
      - name: nginx-config
        configMap:
          name: nginx-https-config
---
apiVersion: v1
kind: Service
metadata:
  name: env0-region-runtimepod
  namespace: teama-nosidecare-rt-ns-int
  labels:
    app: env0-region-runtimepod
  annotations:
    cloud.google.com/neg: '{"ingress":true}'
spec:
  type: ClusterIP
  selector:
    app: env0-region-runtimepod
  ports:
  - name: https-app
    port: 8443
    targetPort: 8443
    protocol: TCP