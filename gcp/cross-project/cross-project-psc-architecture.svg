<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#020617"/>
  <rect width="960" height="720" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="38" fill="white" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">跨项目 PSC 架构全景图</text>
  <text x="30" y="56" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="11">A Project Shared VPC (Consumer) → PSC Tunnel → B Project Private VPC (Producer)</text>

  <!-- ==================== A PROJECT - Shared VPC (Consumer) ==================== -->
  <rect x="20" y="75" width="420" height="380" rx="12" fill="rgba(8, 51, 68, 0.15)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="32" y="97" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">A Project — Shared VPC (Consumer)</text>
  <text x="32" y="112" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">Global Load Balancer + PSC NEG</text>

  <!-- External Client -->
  <rect x="55" y="130" width="120" height="55" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="55" y="130" width="120" height="55" rx="6" fill="rgba(30, 41, 59, 0.6)"/>
  <text x="115" y="152" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">External Client</text>
  <text x="115" y="168" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">HTTPS :443</text>

  <!-- GLB -->
  <rect x="55" y="210" width="160" height="65" rx="6" fill="#0f172a"/>
  <rect x="55" y="210" width="160" height="65" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="135" y="232" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">GLB</text>
  <text x="135" y="248" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">Global HTTPS LB</text>
  <text x="135" y="263" fill="#fbbf24" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">Target HTTPS Proxy</text>

  <!-- Cloud Armor -->
  <rect x="55" y="300" width="160" height="65" rx="6" fill="#0f172a"/>
  <rect x="55" y="300" width="160" height="65" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="135" y="322" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Cloud Armor</text>
  <text x="135" y="338" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">Security Policy</text>
  <text x="135" y="353" fill="#fb7185" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">WAF / DDoS Protection</text>

  <!-- Backend Service A -->
  <rect x="55" y="390" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="55" y="390" width="160" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="135" y="412" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Backend Service</text>
  <text x="135" y="428" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">Global / Regional</text>

  <!-- PSC NEG -->
  <rect x="55" y="470" width="160" height="65" rx="6" fill="#0f172a"/>
  <rect x="55" y="470" width="160" height="65" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="135" y="492" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">PSC NEG</text>
  <text x="135" y="508" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">PRIVATE_SERVICE_CONNECT</text>
  <text x="135" y="523" fill="#fb923c" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">type: network_endpoint</text>

  <!-- A Project vertical arrows -->
  <line x1="115" y1="185" x2="115" y2="208" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="126" y="200" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">HTTPS</text>

  <line x1="135" y1="275" x2="135" y2="298" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="146" y="290" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">Policy</text>

  <line x1="135" y1="365" x2="135" y2="388" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="146" y="380" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">NEG</text>

  <line x1="135" y1="445" x2="135" y2="468" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="146" y="460" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">PSC</text>

  <!-- Client to GLB horizontal arrow -->
  <line x1="175" y1="158" x2="305" y2="158" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="305" y1="158" x2="305" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="240" y="152" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">HTTPS</text>

  <!-- ==================== PSC TUNNEL ==================== -->
  <rect x="230" y="500" width="500" height="60" rx="8" fill="rgba(251, 146, 60, 0.08)" stroke="#fb923c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="480" y="520" fill="#fb923c" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" text-anchor="middle">PSC Private Service Connect Tunnel</text>
  <text x="480" y="536" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">GCP 内部网络 · 无需 VPC Peering · IP 空间可重叠</text>
  <text x="480" y="550" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">自动建立跨 Project VPC 隔离通道</text>

  <!-- Arrows from PSC NEG to tunnel -->
  <line x1="215" y1="502" x2="250" y2="520" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="710" y1="520" x2="746" y2="502" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ==================== B PROJECT - Private VPC (Producer) ==================== -->
  <rect x="520" y="75" width="420" height="380" rx="12" fill="rgba(76, 29, 149, 0.12)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="532" y="97" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">B Project — Private VPC (Producer)</text>
  <text x="532" y="112" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">Service Attachment + ILB + Backend</text>

  <!-- PSC NAT Subnet -->
  <rect x="545" y="130" width="370" height="50" rx="6" fill="#0f172a"/>
  <rect x="545" y="130" width="370" height="50" rx="6" fill="rgba(136, 19, 55, 0.25)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="560" y="150" fill="#fb7185" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">PSC NAT Subnet</text>
  <text x="560" y="166" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">purpose: PRIVATE_SERVICE_CONNECT · 专用于 SNAT 地址转换</text>

  <!-- Service Attachment -->
  <rect x="545" y="205" width="370" height="70" rx="6" fill="#0f172a"/>
  <rect x="545" y="205" width="370" height="70" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="730" y="227" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Service Attachment</text>
  <text x="730" y="243" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">connection-preference: ACCEPT_MANUAL</text>
  <text x="730" y="257" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">consumer-accept-list: a-project-id=100</text>
  <text x="730" y="271" fill="#fb923c" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">绑定 PSC NAT Subnet</text>

  <!-- ILB -->
  <rect x="545" y="300" width="370" height="65" rx="6" fill="#0f172a"/>
  <rect x="545" y="300" width="370" height="65" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="730" y="322" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Internal Load Balancer</text>
  <text x="730" y="338" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">Internal L4/L7 · Forwarding Rule</text>
  <text x="730" y="353" fill="#34d399" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">Producer 侧入口</text>

  <!-- Backend (GKE/VM/MIG) -->
  <rect x="545" y="390" width="370" height="65" rx="6" fill="#0f172a"/>
  <rect x="545" y="390" width="370" height="65" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="730" y="412" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">Backend Service</text>
  <text x="730" y="428" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">GKE / VM / MIG</text>
  <text x="730" y="443" fill="#fbbf24" font-family="JetBrains Mono, monospace" font-size="7" text-anchor="middle">真实 Backend · IP 不暴露</text>

  <!-- B Project arrows -->
  <line x1="730" y1="180" x2="730" y2="203" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="742" y="195" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">SNAT</text>

  <line x1="730" y1="275" x2="730" y2="298" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="742" y="290" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">Route</text>

  <line x1="730" y1="365" x2="730" y2="388" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="742" y="380" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">Forward</text>

  <!-- Consumer Subnet info (below A project components) -->
  <rect x="20" y="560" width="420" height="45" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#64748b" stroke-width="1"/>
  <text x="35" y="578" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Subnet: shared-vpc-subnet (Consumer 侧普通 subnet)</text>
  <text x="35" y="594" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">PSC 接入 IP 从该 subnet 分配，用于 GCP 内部隧道</text>

  <!-- NAT 说明 (below B project components) -->
  <rect x="520" y="460" width="420" height="70" rx="6" fill="rgba(15, 23, 42, 0.6)" stroke="#475569" stroke-width="1"/>
  <text x="535" y="480" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">PSC NAT 机制：</text>
  <text x="535" y="496" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">• Consumer 流量进入 Producer VPC 时</text>
  <text x="535" y="510" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">• 源 IP 被替换为 PSC NAT Subnet IP</text>
  <text x="535" y="524" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">• 实现双向 IP 隔离，Backend IP 完全隐藏</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="20" y="620" width="920" height="45" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="#1e293b" stroke-width="1"/>
  <text x="38" y="638" fill="white" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600">Legend</text>

  <rect x="38" y="648" width="14" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="56" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">入口层</text>

  <rect x="110" y="648" width="14" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="128" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">GCP 云服务</text>

  <rect x="210" y="648" width="14" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="228" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">Backend</text>

  <rect x="290" y="648" width="14" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="308" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">存储</text>

  <rect x="360" y="648" width="14" height="10" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="378" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">PSC/消息</text>

  <rect x="450" y="648" width="14" height="10" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="468" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">安全</text>

  <!-- Dashed separator in legend -->
  <line x1="520" y1="634" x2="520" y2="657" stroke="#334155" stroke-width="1"/>

  <rect x="535" y="648" width="14" height="10" rx="2" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="553" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">NAT Subnet</text>

  <rect x="630" y="648" width="14" height="10" rx="2" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="648" y="656" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">普通 Subnet</text>

  <line x1="720" y1="648" x2="735" y2="648" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="740" y="651" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">数据流</text>

  <line x1="790" y1="648" x2="805" y2="648" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="810" y="651" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="8">PSC 隧道</text>

  <!-- Footer -->
  <text x="480" y="690" fill="#475569" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Cross-Project PSC Architecture · A Project (Shared VPC) → B Project (Private VPC) · GCP Private Service Connect</text>
</svg>
