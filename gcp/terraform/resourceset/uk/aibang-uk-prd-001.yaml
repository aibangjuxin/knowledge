# ResourceSet: aibang-uk-prd-001
# 所在 region: uk (europe-west2)
# 用途: UK 生产环境, GKE + 周边基础设施

project:
  id: aibang-uk-prd-001
  name: "aibang-uk-prd"
  billing_account: "012345-6789AB-CDEF01"
  folder_id: "folders/9876543210"
  services:
    - compute.googleapis.com
    - container.googleapis.com
    - servicenetworking.googleapis.com
    - cloudresourcemanager.googleapis.com

network:
  vpc_name: aibang-uk-prd-vpc
  vpc_cidr: "10.10.0.0/16"
  subnets:
    - name: gke-nodes
      cidr: "10.10.0.0/20"
      region: europe-west2
      purpose: GKE
      private_google_access: true
    - name: proxy-only
      cidr: "10.10.32.0/28"
      region: europe-west2
      purpose: PSC_PROXY
    - name: mig
      cidr: "10.10.48.0/20"
      region: europe-west2
      purpose: MIG
  cloud_nat: true

gke:
  cluster_name: aibang-uk-prd-gke
  region: europe-west2
  machine_type: n2-standard-8
  min_nodes: 3
  max_nodes: 20
  enable_private_nodes: true
  enable_private_endpoint: false
  master_ipv4_cidr: "172.16.0.0/28"
  pod_ipv4_cidr: "10.20.0.0/14"
  service_ipv4_cidr: "10.24.0.0/20"

backend:
  bucket: terraform-state-uk-prd-001
  prefix: gke/europe-west2
