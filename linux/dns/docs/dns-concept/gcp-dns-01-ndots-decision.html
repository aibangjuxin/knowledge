<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GKE DNS — ndots 与 Search Path 决策流程</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #1c1a17;
      --color-paper-2: #2a2723;
      --color-ink:     #f1efe7;
      --color-muted:   #a8a69d;
      --color-accent:  #ff6a30;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · DNS Resolver</p>
    <h1>GKE Pod DNS — ndots 与 Search Path 决策流程</h1>

    <svg viewBox="0 0 1080 680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(241,239,231,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a8a69d"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff6a30"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#1c1a17"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Arrows -->
      <!-- App Query → diamond ndots check -->
      <line x1="540" y1="96" x2="540" y2="136" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- YES right → absolute fqdn result -->
      <line x1="680" y1="188" x2="840" y2="188" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- YES right arrow label -->
      <rect x="728" y="178" width="24" height="12" rx="2" fill="#1c1a17"/>
      <text x="740" y="187" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>
      <!-- NO down → search path expansion -->
      <line x1="540" y1="236" x2="540" y2="272" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- NO label -->
      <rect x="516" y="252" width="24" height="12" rx="2" fill="#1c1a17"/>
      <text x="528" y="261" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>
      <!-- Search path → first expansion -->
      <line x1="540" y1="312" x2="540" y2="344" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- More search? YES right loop back -->
      <line x1="600" y1="396" x2="680" y2="396" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="680" y1="396" x2="680" y2="344" stroke="#a8a69d" stroke-width="1.2"/>
      <line x1="680" y1="344" x2="628" y2="344" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- More search? NO down -->
      <line x1="540" y1="444" x2="540" y2="488" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- More search labels -->
      <rect x="612" y="386" width="36" height="12" rx="2" fill="#1c1a17"/>
      <text x="630" y="395" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">MORE</text>
      <rect x="516" y="462" width="24" height="12" rx="2" fill="#1c1a17"/>
      <text x="528" y="471" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>
      <!-- Last search → original name query -->
      <line x1="540" y1="580" x2="540" y2="604" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Labels for search expansion -->
      <rect x="432" y="324" width="80" height="12" rx="2" fill="#1c1a17"/>
      <text x="472" y="333" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">+search[0]</text>
      <rect x="420" y="410" width="92" height="12" rx="2" fill="#1c1a17"/>
      <text x="466" y="419" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">+search[n-1]</text>
      <rect x="448" y="592" width="64" height="12" rx="2" fill="#1c1a17"/>
      <text x="480" y="601" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ORIGINAL</text>
      <!-- Result arrow from absolute FQDN -->
      <line x1="940" y1="188" x2="980" y2="188" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- Labels -->
      <rect x="976" y="178" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="1002" y="187" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">直接查询</text>
      <!-- Result arrow from original -->
      <line x1="540" y1="636" x2="900" y2="636" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="700" y="626" width="64" height="12" rx="2" fill="#1c1a17"/>
      <text x="732" y="635" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">原始名字</text>

      <!-- START: App Query -->
      <rect x="400" y="40" width="280" height="56" rx="28" fill="rgba(241,239,231,0.03)" stroke="rgba(241,239,231,0.30)" stroke-width="1"/>
      <text x="540" y="68" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">应用发起 DNS 查询</text>
      <text x="540" y="84" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">例: api1.teamname1.appdev.aibang</text>

      <!-- Diamond: ndots check -->
      <polygon points="540,136 660,188 540,236 420,188" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="180" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">点数 ≥ ndots</text>
      <text x="540" y="196" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">(含尾部点? 直接查 FQDN)</text>

      <!-- Right box: absolute FQDN result (coral focal) -->
      <rect x="840" y="160" width="100" height="56" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="890" y="188" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">绝对 FQDN</text>
      <text x="890" y="204" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">api.teamname.aibang.</text>

      <!-- Search path expansion box -->
      <rect x="280" y="272" width="520" height="72" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="300" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">追加 Search Path (逐条拼接)</text>
      <text x="540" y="318" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">例: api1.teamname1.appdev.aibang.</text>
      <text x="540" y="334" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">→ my-ns.svc.cluster.local → svc.cluster.local → cluster.local</text>

      <!-- Diamond: more search items? -->
      <polygon points="540,396 636,444 540,488 444,444" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="436" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">还有 search</text>
      <text x="540" y="450" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">项待查询?</text>

      <!-- Box: Last search item -->
      <rect x="340" y="488" width="400" height="52" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="512" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">最后一项 search 拼接完成</text>
      <text x="540" y="528" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">api1.teamname1.appdev.aibang.c.aibang-project.internal</text>

      <!-- Box: Original name query (focal) -->
      <rect x="340" y="604" width="400" height="52" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="540" y="628" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">查询原始名字 (无 search path)</text>
      <text x="540" y="644" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">api1.teamname1.appdev.aibang</text>

      <!-- Result labels at right -->
      <rect x="984" y="160" width="60" height="56" rx="8" fill="rgba(255,106,48,0.04)" stroke="rgba(255,106,48,0.30)" stroke-width="1"/>
      <text x="1014" y="188" fill="#ff6a30" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">返回</text>
      <text x="1014" y="204" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">A记录</text>

      <rect x="920" y="604" width="120" height="52" rx="8" fill="#2a2723" stroke="#a8a69d" stroke-width="1"/>
      <text x="980" y="628" fill="#a8a69d" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">返回</text>
      <text x="980" y="644" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">或 NXDOMAIN</text>

      <!-- Legend -->
      <line x1="40" y1="620" x2="1040" y2="620" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <text x="40" y="636" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND · SHAPE CARRIES TYPE</text>
      <rect x="40" y="656" width="24" height="12" rx="6" fill="rgba(241,239,231,0.03)" stroke="rgba(241,239,231,0.30)" stroke-width="1"/>
      <text x="72" y="666" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Start / end</text>
      <rect x="196" y="656" width="24" height="12" rx="2" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="228" y="666" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Step</text>
      <polygon points="388,662 400,656 412,662 400,668" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="424" y="666" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Decision</text>
      <line x1="580" y1="664" x2="608" y2="664" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="616" y="666" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Happy path (绝对 FQDN)</text>
      <line x1="828" y1="664" x2="856" y2="664" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="864" y="666" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Branch</text>
    </svg>
  </div>
</body>
</html>
