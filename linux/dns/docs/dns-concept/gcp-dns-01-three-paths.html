<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GKE DNS 三种模式 — 架构图</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #1c1917;
      --color-paper-2: #292524;
      --color-ink:     #faf7f2;
      --color-muted:   #a8a29e;
      --color-soft:    #8e8680;
      --color-accent:  #d6724a;
      --color-accent-tint: rgba(214,114,74,0.10);
      --color-link:    #60a5fa;
      --font-sans:  'Geist', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', serif;
      --font-mono:  'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · GKE DNS</p>
    <h1>GKE Pod DNS 查询路径：三种第一跳模式</h1>

    <svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(250,247,242,0.08)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a8a29e"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d6724a"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/></marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#1c1917"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ==================== ARROWS ==================== -->
      <!-- Pod → NodeLocal -->
      <line x1="120" y1="140" x2="120" y2="190" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Pod → Cloud DNS for GKE -->
      <line x1="360" y1="140" x2="360" y2="190" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Pod → kube-dns -->
      <line x1="600" y1="140" x2="600" y2="190" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- NodeLocal → Cache hit -->
      <line x1="120" y1="230" x2="120" y2="280" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Cache miss → Cloud DNS / kube-dns decision -->
      <line x1="120" y1="320" x2="120" y2="370" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- kube-dns → Cloud DNS -->
      <line x1="600" y1="250" x2="760" y2="250" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- Three paths converge to Cloud DNS -->
      <line x1="120" y1="410" x2="400" y2="410" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="360" y1="250" x2="400" y2="370" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="600" y1="410" x2="500" y2="410" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- Cloud DNS → Return -->
      <line x1="480" y1="470" x2="480" y2="510" stroke="#d6724a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>

      <!-- Arrow labels -->
      <rect x="88" y="162" width="64" height="16" rx="2" fill="#1c1917"/>
      <text x="120" y="173" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">169.254.20.10</text>

      <rect x="328" y="162" width="64" height="16" rx="2" fill="#1c1917"/>
      <text x="360" y="173" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">169.254.169.254</text>

      <rect x="568" y="162" width="64" height="16" rx="2" fill="#1c1917"/>
      <text x="600" y="173" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">10.x ClusterIP</text>

      <!-- Cloud DNS label -->
      <rect x="430" y="392" width="100" height="16" rx="2" fill="#1c1917"/>
      <text x="480" y="403" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">Cloud DNS</text>

      <!-- ==================== NODES ==================== -->
      <!-- Pod resolv.conf — focal -->
      <rect x="20" y="80" width="200" height="60" rx="6" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1.2"/>
      <rect x="28" y="86" width="40" height="12" rx="2" fill="transparent" stroke="rgba(214,114,74,0.50)" stroke-width="0.8"/>
      <text x="48" y="95" fill="#d6724a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">POD</text>
      <text x="120" y="115" fill="#faf7f2" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Pod /etc/resolv.conf</text>
      <text x="120" y="132" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">nameserver + ndots + search</text>

      <!-- NodeLocal DNSCache node -->
      <rect x="20" y="200" width="200" height="60" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <rect x="28" y="206" width="56" height="12" rx="2" fill="transparent" stroke="rgba(250,247,242,0.40)" stroke-width="0.8"/>
      <text x="56" y="215" fill="#a8a29e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">BACKEND</text>
      <text x="120" y="235" fill="#faf7f2" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">NodeLocal DNSCache</text>
      <text x="120" y="252" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">缓存命中 → 直接返回</text>

      <!-- Cache hit node -->
      <rect x="20" y="290" width="200" height="44" rx="6" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.20)" stroke-width="0.8" stroke-dasharray="4,3"/>
      <text x="120" y="318" fill="#a8a29e" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">缓存命中 ✓</text>

      <!-- Cloud DNS for GKE node -->
      <rect x="260" y="200" width="200" height="60" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <rect x="268" y="206" width="64" height="12" rx="2" fill="transparent" stroke="rgba(250,247,242,0.40)" stroke-width="0.8"/>
      <text x="300" y="215" fill="#a8a29e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">BACKEND</text>
      <text x="360" y="235" fill="#faf7f2" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cloud DNS for GKE</text>
      <text x="360" y="252" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">数据平面 · 169.254.169.254</text>

      <!-- kube-dns Service node -->
      <rect x="500" y="200" width="200" height="60" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <rect x="508" y="206" width="52" height="12" rx="2" fill="transparent" stroke="rgba(250,247,242,0.40)" stroke-width="0.8"/>
      <text x="534" y="215" fill="#a8a29e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">BACKEND</text>
      <text x="600" y="235" fill="#faf7f2" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">kube-dns Service</text>
      <text x="600" y="252" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ClusterIP · Standard 默认</text>

      <!-- Decision node — cluster.local / external -->
      <rect x="20" y="380" width="200" height="48" rx="6" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.30)" stroke-width="0.8"/>
      <text x="120" y="402" fill="#a8a29e" font-size="10" font-family="'Geist', sans-serif" text-anchor="middle">cluster.local / svc ?</text>
      <text x="120" y="418" fill="#78716c" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">是 → kube-dns / Cloud DNS</text>

      <!-- Cloud DNS final -->
      <rect x="360" y="420" width="240" height="60" rx="6" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1.2"/>
      <rect x="368" y="426" width="56" height="12" rx="2" fill="transparent" stroke="rgba(214,114,74,0.50)" stroke-width="0.8"/>
      <text x="396" y="435" fill="#d6724a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FOCAL</text>
      <text x="480" y="455" fill="#faf7f2" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cloud DNS Name Resolution</text>
      <text x="480" y="472" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Private Zone / Forwarding / Peering</text>

      <!-- Return -->
      <rect x="380" y="520" width="200" height="36" rx="6" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.20)" stroke-width="0.8"/>
      <text x="480" y="542" fill="#a8a29e" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">返回解析结果 ✓</text>

      <!-- ==================== LEGEND ==================== -->
      <line x1="30" y1="570" x2="970" y2="570" stroke="rgba(250,247,242,0.10)" stroke-width="0.8"/>
      <text x="30" y="584" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <!-- POD -->
      <rect x="80" y="576" width="10" height="10" rx="2" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1"/>
      <text x="96" y="585" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Pod / Input</text>
      <!-- BACKEND -->
      <rect x="190" y="576" width="10" height="10" rx="2" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <text x="206" y="585" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Backend / Service</text>
      <!-- FOCAL -->
      <rect x="320" y="576" width="10" height="10" rx="2" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1"/>
      <text x="336" y="585" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Focal (关键节点)</text>
      <!-- OPTIONAL -->
      <rect x="430" y="576" width="10" height="10" rx="2" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.20)" stroke-width="0.8" stroke-dasharray="4,3"/>
      <text x="446" y="585" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Optional / Conditional</text>
      <!-- Arrow -->
      <line x1="570" y1="581" x2="590" y2="581" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="600" y="585" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">查询路径</text>
    </svg>
  </div>
</body>
</html>
