<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud DNS Name Resolution Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #1c1a17;
      --color-paper-2: #2a2723;
      --color-ink:     #f1efe7;
      --color-muted:   #a8a69d;
      --color-accent:  #ff6a30;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Cloud DNS</p>
    <h1>Cloud DNS Name Resolution Order — VPC 解析顺序</h1>

    <svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(241,239,231,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a8a69d"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff6a30"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#1c1a17"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Arrows -->
      <!-- Query in → Step 1 -->
      <line x1="540" y1="96" x2="540" y2="132" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Step 1 → 2 -->
      <line x1="540" y1="180" x2="540" y2="216" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Step 2 → 3 -->
      <line x1="540" y1="264" x2="540" y2="300" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Step 3 → 4 -->
      <line x1="540" y1="348" x2="540" y2="384" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Step 4 → 5 (diamond) -->
      <line x1="540" y1="432" x2="540" y2="468" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Step 5 YES right → Peering Zone -->
      <line x1="680" y1="528" x2="780" y2="528" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- Step 5 NO down → 5 types expand -->
      <line x1="540" y1="576" x2="540" y2="620" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 5 types → Step 6 -->
      <line x1="540" y1="700" x2="540" y2="716" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Step 6 → 7 -->
      <line x1="540" y1="764" x2="200" y2="764" stroke="#a8a69d" stroke-width="1.2"/>
      <line x1="200" y1="764" x2="200" y2="700" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Labels -->
      <rect x="516" y="300" width="24" height="12" rx="2" fill="#1c1a17"/>
      <text x="528" y="309" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>
      <rect x="700" y="518" width="24" height="12" rx="2" fill="#1c1a17"/>
      <text x="712" y="527" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>
      <rect x="516" y="594" width="24" height="12" rx="2" fill="#1c1a17"/>
      <text x="528" y="603" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>
      <!-- Branch labels for zone types -->
      <rect x="788" y="518" width="64" height="12" rx="2" fill="#1c1a17"/>
      <text x="820" y="527" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Peering</text>
      <!-- Step 7 label -->
      <rect x="236" y="692" width="64" height="12" rx="2" fill="#1c1a17"/>
      <text x="268" y="701" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">最后兜底</text>

      <!-- START: Query in -->
      <rect x="380" y="40" width="320" height="56" rx="28" fill="rgba(241,239,231,0.03)" stroke="rgba(241,239,231,0.30)" stroke-width="1"/>
      <text x="540" y="68" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GKE 节点 / Pod DNS 查询进入 Cloud DNS</text>
      <text x="540" y="84" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">query: api.aliyun.cloud.region.aibang</text>

      <!-- Step 1: Cluster-scoped response policy -->
      <rect x="280" y="132" width="520" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="160" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">① Cluster-scoped Response Policy</text>
      <text x="540" y="172" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">GKE cluster 级别响应策略</text>

      <!-- Step 2: Cluster-scoped zones -->
      <rect x="280" y="216" width="520" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="244" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">② Cluster-scoped Private / Forwarding Zone</text>
      <text x="540" y="256" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">集群级别私有 zone / 转发 zone</text>

      <!-- Step 3: VPC outbound server policy -->
      <rect x="280" y="300" width="520" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="328" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">③ VPC Outbound Server Policy</text>
      <text x="540" y="340" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">VPC 级别出站DNS策略 (若配置)</text>

      <!-- Step 4: VPC response policy -->
      <rect x="280" y="384" width="520" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="412" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">④ VPC Response Policy</text>
      <text x="540" y="424" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">VPC 级别响应策略</text>

      <!-- Step 5 Diamond: VPC Managed Private Zones -->
      <polygon points="540,468 680,528 540,584 400,528" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="520" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">VPC Managed Private Zones</text>
      <text x="540" y="536" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">最长后缀匹配</text>

      <!-- Peering Zone result -->
      <rect x="780" y="500" width="160" height="56" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="860" y="528" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Peering Zone</text>
      <text x="860" y="544" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">切到 Producer VPC</text>

      <!-- Zone types expanded below diamond -->
      <rect x="180" y="620" width="720" height="72" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="644" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Private Zone / Forwarding Zone / Peering Zone — 按最具体后缀命中</text>
      <text x="360" y="668" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Private Zone</text>
      <text x="540" y="668" fill="#ff6a30" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">→ 返回记录或 NXDOMAIN</text>
      <text x="720" y="668" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Forwarding → 转发到 Target DNS</text>

      <!-- Step 6: Compute Engine internal DNS -->
      <rect x="280" y="716" width="520" height="48" rx="6" fill="#2a2723" stroke="#a8a69d" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="540" y="744" fill="#a8a69d" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">⑤ Compute Engine Internal DNS</text>
      <text x="540" y="756" fill="#78716c" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">instance.google.internal</text>

      <!-- Step 7: Public DNS recursion (focal) -->
      <rect x="100" y="700" width="200" height="56" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="200" y="728" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">⑥ Public DNS</text>
      <text x="200" y="744" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">递归查询公网</text>

      <!-- Legend -->
      <line x1="40" y1="700" x2="1060" y2="700" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <text x="40" y="716" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
      <rect x="40" y="728" width="24" height="12" rx="6" fill="rgba(241,239,231,0.03)" stroke="rgba(241,239,231,0.30)" stroke-width="1"/>
      <text x="72" y="738" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Start / end</text>
      <rect x="200" y="728" width="24" height="12" rx="2" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="232" y="738" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Step</text>
      <polygon points="392,734 404,728 416,734 404,740" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="428" y="738" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Decision</text>
      <line x1="580" y1="736" x2="608" y2="736" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="616" y="738" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Happy path</text>
      <line x1="780" y1="736" x2="808" y2="736" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="816" y="738" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Branch</text>
    </svg>
  </div>
</body>
</html>
