<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推荐架构：VPC2 Peering Zone → VPC1 Forwarding Zone — 架构图</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #1c1917;
      --color-paper-2: #292524;
      --color-ink:     #faf7f2;
      --color-muted:   #a8a29e;
      --color-soft:    #8e8680;
      --color-accent:  #d6724a;
      --color-accent-tint: rgba(214,114,74,0.10);
      --color-link:    #60a5fa;
      --font-sans:  'Geist', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', serif;
      --font-mono:  'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Cross-VPC DNS</p>
    <h1>推荐架构：GKE VPC2 → DNS Peering → VPC1 Forwarding → 企业 DNS</h1>

    <svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(250,247,242,0.08)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a8a29e"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d6724a"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/></marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#1c1917"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ==================== VPC BOUNDARY BOXES ==================== -->
      <!-- VPC2 boundary -->
      <rect x="12" y="12" width="520" height="620" rx="8" fill="transparent" stroke="rgba(250,247,242,0.12)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="20" y="30" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.06em">VPC2 — GKE Tenant (us-east4)</text>

      <!-- VPC1 boundary -->
      <rect x="568" y="12" width="520" height="620" rx="8" fill="transparent" stroke="rgba(250,247,242,0.12)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="576" y="30" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.06em">VPC1 — DNS Producer / Shared Services</text>

      <!-- Enterprise network outside -->
      <rect x="12" y="640" width="1076" height="70" rx="8" fill="transparent" stroke="rgba(96,165,250,0.30)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="20" y="658" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.06em">ENTERPRISE NETWORK (on-prem / Alibaba Cloud)</text>

      <!-- ==================== ARROWS ==================== -->
      <!-- Pod → NodeLocal / Cloud DNS for GKE -->
      <line x1="120" y1="180" x2="120" y2="228" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Cloud DNS for GKE → Peering Zone -->
      <line x1="120" y1="268" x2="120" y2="320" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Peering Zone → VPC1 DNS resolution -->
      <line x1="220" y1="300" x2="568" y2="300" stroke="#60a5fa" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#arrow-link)"/>
      <!-- VPC1 Peering Zone → VPC1 Forwarding Zone -->
      <line x1="660" y1="300" x2="660" y2="400" stroke="#a8a29e" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Forwarding Zone → Enterprise DNS -->
      <line x1="660" y1="440" x2="660" y2="560" stroke="#d6724a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <!-- Return path -->
      <line x1="660" y1="560" x2="120" y2="560" stroke="#a8a29e" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
      <line x1="120" y1="560" x2="120" y2="480" stroke="#d6724a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <!-- Return to Pod -->
      <line x1="120" y1="448" x2="120" y2="390" stroke="#d6724a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>

      <!-- ==================== NODES ==================== -->
      <!-- Pod node -->
      <rect x="30" y="80" width="180" height="100" rx="6" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1.2"/>
      <rect x="38" y="86" width="28" height="12" rx="2" fill="transparent" stroke="rgba(214,114,74,0.50)" stroke-width="0.8"/>
      <text x="52" y="95" fill="#d6724a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">POD</text>
      <text x="120" y="115" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Java App in GKE</text>
      <text x="120" y="132" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/etc/resolv.conf:</text>
      <text x="120" y="147" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">nameserver 100.68.0.10</text>
      <text x="120" y="162" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">options ndots:5</text>
      <text x="120" y="172" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">→ NodeLocal 169.254.20.10</text>

      <!-- GKE DNS entry point (kube-dns / Cloud DNS for GKE) -->
      <rect x="30" y="228" width="180" height="44" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <text x="120" y="255" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">kube-dns / Cloud DNS for GKE</text>

      <!-- Cloud DNS Peering Zone: aibang. (FOCAL in VPC2) -->
      <rect x="30" y="320" width="180" height="76" rx="6" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1.2"/>
      <rect x="38" y="326" width="48" height="12" rx="2" fill="transparent" stroke="rgba(214,114,74,0.50)" stroke-width="0.8"/>
      <text x="62" y="335" fill="#d6724a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FOCAL</text>
      <text x="120" y="355" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cloud DNS Peering Zone</text>
      <text x="120" y="372" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">dnsName: aibang.</text>
      <text x="120" y="386" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">targetNetwork: VPC1</text>

      <!-- Arrow label: to VPC1 -->
      <rect x="230" y="286" width="80" height="16" rx="2" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.30)" stroke-width="0.8"/>
      <text x="270" y="297" fill="#60a5fa" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">DNS Peering</text>

      <!-- VPC1: Cloud DNS name resolution order -->
      <rect x="580" y="228" width="180" height="68" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <rect x="588" y="234" width="52" height="12" rx="2" fill="transparent" stroke="rgba(250,247,242,0.40)" stroke-width="0.8"/>
      <text x="614" y="243" fill="#a8a29e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">VPC1 DNS</text>
      <text x="670" y="258" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">VPC1 Name Resolution</text>
      <text x="670" y="274" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">按 longest suffix match 顺序</text>
      <text x="670" y="288" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Cluster-scoped → Outbound → VPC</text>

      <!-- VPC1: Peering Zone (receives from VPC2) -->
      <rect x="580" y="320" width="160" height="56" rx="6" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.40)" stroke-width="0.8"/>
      <text x="660" y="345" fill="#60a5fa" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Peering Zone 接收</text>
      <text x="660" y="362" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">VPC2 的查询进入 VPC1</text>

      <!-- VPC1: Forwarding Zone: aibang. (FOCAL in VPC1) -->
      <rect x="580" y="400" width="160" height="76" rx="6" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1.2"/>
      <rect x="588" y="406" width="48" height="12" rx="2" fill="transparent" stroke="rgba(214,114,74,0.50)" stroke-width="0.8"/>
      <text x="612" y="415" fill="#d6724a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FOCAL</text>
      <text x="660" y="435" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Forwarding Zone</text>
      <text x="660" y="452" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">dnsName: aibang.</text>
      <text x="660" y="468" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">forwarding to target DNS</text>

      <!-- VPC1: Forwarding target -->
      <rect x="580" y="480" width="160" height="56" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <text x="660" y="505" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Forwarding Target</text>
      <text x="660" y="522" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ILB / internal DNS / on-prem</text>
      <text x="660" y="536" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">src: 35.199.192.0/19</text>

      <!-- Enterprise DNS -->
      <rect x="580" y="560" width="160" height="52" rx="6" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1.2"/>
      <text x="660" y="582" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Enterprise DNS</text>
      <text x="660" y="598" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">内部权威 DNS</text>

      <!-- Return labels -->
      <rect x="230" y="546" width="80" height="16" rx="2" fill="#1c1917"/>
      <text x="270" y="557" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">answer 返回</text>

      <rect x="88" y="476" width="64" height="16" rx="2" fill="#1c1917"/>
      <text x="120" y="487" fill="#d6724a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">answer</text>

      <!-- ==================== ZONE HIERARCHY (right side) ==================== -->
      <!-- DNS zone hierarchy tree -->
      <rect x="820" y="80" width="240" height="280" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <text x="940" y="100" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">DNS Zone 分层建议</text>

      <!-- Root zone -->
      <rect x="840" y="120" width="200" height="36" rx="4" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.20)" stroke-width="0.8"/>
      <text x="940" y="141" fill="#a8a29e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">aibang. (公司根域)</text>
      <text x="940" y="152" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">承载少量核心记录</text>

      <!-- Level 1 -->
      <line x1="940" y1="156" x2="940" y2="172" stroke="#a8a29e" stroke-width="0.8"/>
      <rect x="840" y="172" width="200" height="36" rx="4" fill="rgba(214,114,74,0.08)" stroke="rgba(214,114,74,0.40)" stroke-width="0.8"/>
      <text x="940" y="193" fill="#faf7f2" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">appdev.aibang. (平台入口)</text>
      <text x="940" y="204" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">VPC2 private zone / peering</text>

      <!-- Level 2 -->
      <line x1="940" y1="208" x2="940" y2="224" stroke="#a8a29e" stroke-width="0.8"/>
      <rect x="840" y="224" width="200" height="36" rx="4" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.20)" stroke-width="0.8"/>
      <text x="940" y="245" fill="#faf7f2" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">teamname.appdev.aibang.</text>
      <text x="940" y="256" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">团队隔离边界</text>

      <!-- Level 3 -->
      <line x1="940" y1="260" x2="940" y2="276" stroke="#a8a29e" stroke-width="0.8"/>
      <rect x="840" y="276" width="200" height="36" rx="4" fill="rgba(250,247,242,0.05)" stroke="rgba(250,247,242,0.20)" stroke-width="0.8"/>
      <text x="940" y="297" fill="#faf7f2" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">api1.teamname.appdev.aibang.</text>
      <text x="940" y="308" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Java 应用访问 FQDN</text>

      <!-- Wildcard note -->
      <rect x="840" y="328" width="200" height="28" rx="4" fill="rgba(250,247,242,0.03)" stroke="rgba(250,247,242,0.15)" stroke-width="0.6" stroke-dasharray="3,2"/>
      <text x="940" y="346" fill="#78716c" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">*.teamname.appdev.aibang. → wildcard</text>

      <!-- ==================== FIREWALL NOTE ==================== -->
      <rect x="820" y="380" width="240" height="100" rx="6" fill="#292524" stroke="#faf7f2" stroke-width="1"/>
      <text x="940" y="400" fill="#faf7f2" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Forwarding 防火墙要求</text>
      <text x="940" y="420" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">源: 35.199.192.0/19</text>
      <text x="940" y="436" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">协议: TCP/UDP 53</text>
      <text x="940" y="452" fill="#8e8680" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">目标 DNS 需允许上述源</text>
      <text x="940" y="468" fill="#d6724a" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">不是 169.254.0.0/16</text>

      <!-- ==================== LEGEND ==================== -->
      <line x1="30" y1="722" x2="1070" y2="722" stroke="rgba(250,247,242,0.10)" stroke-width="0.8"/>
      <text x="30" y="736" fill="#8e8680" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <!-- FOCAL -->
      <rect x="80" y="732" width="10" height="10" rx="2" fill="rgba(214,114,74,0.10)" stroke="#d6724a" stroke-width="1"/>
      <text x="96" y="741" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Focal (关键节点)</text>
      <!-- VPC -->
      <rect x="180" y="732" width="10" height="10" rx="2" fill="transparent" stroke="rgba(250,247,242,0.12)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="196" y="741" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">VPC Boundary</text>
      <!-- PEERING -->
      <line x1="300" y1="737" x2="320" y2="737" stroke="#60a5fa" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#arrow-link)"/>
      <text x="330" y="741" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">DNS Peering</text>
      <!-- RETURN -->
      <line x1="420" y1="737" x2="440" y2="737" stroke="#a8a29e" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
      <text x="450" y="741" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Answer 回传</text>
      <!-- ACCENT -->
      <line x1="530" y1="737" x2="550" y2="737" stroke="#d6724a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <text x="560" y="741" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">Forwarding 查询</text>
    </svg>
  </div>
</body>
</html>
