<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three GKE DNS First-Hop Modes</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #1c1a17;
      --color-paper-2: #2a2723;
      --color-ink:     #f1efe7;
      --color-muted:   #a8a69d;
      --color-accent:  #ff6a30;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · GKE DNS</p>
    <h1>GKE Pod DNS — 三种第一跳模式</h1>

    <svg viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(241,239,231,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a8a69d"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff6a30"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#1c1a17"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Arrows -->
      <!-- Pod → diamond (first hop check) -->
      <line x1="540" y1="120" x2="540" y2="160" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Mode A: NodeLocal → right -->
      <line x1="660" y1="232" x2="780" y2="232" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <rect x="692" y="222" width="36" height="12" rx="2" fill="#1c1a17"/>
      <text x="710" y="231" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">169.254.20.10</text>
      <!-- Mode B: Cloud DNS for GKE → right-down -->
      <line x1="660" y1="320" x2="780" y2="320" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="692" y="310" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="718" y="319" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">169.254.169.254</text>
      <!-- Mode C: kube-dns → left-down -->
      <line x1="420" y1="320" x2="300" y2="320" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="332" y="310" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="358" y="319" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">10.x ClusterIP</text>

      <!-- Mode A NodeLocal → cloud DNS -->
      <line x1="880" y1="232" x2="880" y2="288" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Mode B Cloud DNS → cloud DNS (same) -->
      <line x1="880" y1="320" x2="880" y2="288" stroke="#a8a69d" stroke-width="1.2"/>
      <!-- Mode C kube-dns → kube-dns service -->
      <line x1="300" y1="320" x2="300" y2="360" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- kube-dns → cloud DNS -->
      <line x1="300" y1="408" x2="300" y2="440" stroke="#a8a69d" stroke-width="1.2"/>
      <line x1="300" y1="440" x2="880" y2="440" stroke="#a8a69d" stroke-width="1.2"/>
      <line x1="880" y1="440" x2="880" y2="336" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- NodeLocal cache hit path -->
      <line x1="880" y1="336" x2="880" y2="380" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <rect x="852" y="356" width="36" height="12" rx="2" fill="#1c1a17"/>
      <text x="870" y="365" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CACHE</text>

      <!-- Cloud DNS → name resolution order -->
      <line x1="880" y1="440" x2="880" y2="480" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- START: Pod -->
      <rect x="380" y="64" width="320" height="56" rx="28" fill="rgba(241,239,231,0.03)" stroke="rgba(241,239,231,0.30)" stroke-width="1"/>
      <text x="540" y="92" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GKE Pod 发起 DNS 查询</text>
      <text x="540" y="108" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/etc/resolv.conf nameserver</text>

      <!-- Diamond: first hop check -->
      <polygon points="540,160 680,232 540,304 400,232" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="224" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Pod nameserver 类型</text>
      <text x="540" y="240" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">三种模式</text>

      <!-- Mode A: NodeLocal (coral focal) -->
      <rect x="780" y="200" width="200" height="64" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="880" y="228" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">NodeLocal DNSCache</text>
      <text x="880" y="244" fill="#ff6a30" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">169.254.20.10</text>
      <text x="880" y="256" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Autopilot 默认 / Standard 1.34+</text>

      <!-- NodeLocal cache box -->
      <rect x="780" y="380" width="200" height="52" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="880" y="404" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">缓存命中 → 返回</text>
      <text x="880" y="418" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">未命中 → Cloud DNS</text>

      <!-- Mode B: Cloud DNS for GKE -->
      <rect x="780" y="288" width="200" height="64" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="880" y="316" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cloud DNS for GKE</text>
      <text x="880" y="332" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">169.254.169.254</text>
      <text x="880" y="344" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Standard / Autopilot</text>

      <!-- Mode C: kube-dns (left) -->
      <rect x="200" y="360" width="200" height="88" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="300" y="388" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">kube-dns Service</text>
      <text x="300" y="404" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">10.x ClusterIP</text>
      <text x="300" y="416" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Standard 默认 DNS provider</text>
      <text x="300" y="428" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">kube-dns/CoreDNS Pod</text>

      <!-- Cloud DNS common box -->
      <rect x="780" y="480" width="200" height="80" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="880" y="508" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cloud DNS</text>
      <text x="880" y="524" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">VPC name resolution order</text>
      <text x="880" y="536" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Private / Forwarding / Peering Zone</text>
      <text x="880" y="548" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">→ 企业 DNS / 公网</text>

      <!-- Comparison table -->
      <rect x="40" y="560" width="1020" height="100" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="540" y="584" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">三种模式对比</text>
      <text x="160" y="608" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">模式</text>
      <text x="320" y="608" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Nameserver IP</text>
      <text x="500" y="608" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">适用场景</text>
      <text x="720" y="608" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">缓存</text>
      <text x="900" y="608" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">集群内 Service</text>
      <!-- Divider -->
      <line x1="40" y1="616" x2="1060" y2="616" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <!-- Row A -->
      <text x="160" y="636" fill="#ff6a30" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">NodeLocal</text>
      <text x="320" y="636" fill="#f1efe7" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">169.254.20.10</text>
      <text x="500" y="636" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Autopilot / Standard 1.34+</text>
      <text x="720" y="636" fill="#f1efe7" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">节点级缓存</text>
      <text x="900" y="636" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">kube-dns / Cloud DNS</text>
      <!-- Divider -->
      <line x1="40" y1="648" x2="1060" y2="648" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <!-- Row B -->
      <text x="160" y="660" fill="#f1efe7" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cloud DNS for GKE</text>
      <text x="320" y="660" fill="#f1efe7" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">169.254.169.254</text>
      <text x="500" y="660" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Autopilot / Standard 切换</text>
      <text x="720" y="660" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Cloud DNS managed</text>
      <text x="900" y="660" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Cloud DNS sync</text>
      <!-- Divider -->
      <line x1="40" y1="672" x2="1060" y2="672" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <!-- Row C -->
      <text x="160" y="684" fill="#a8a69d" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">kube-dns</text>
      <text x="320" y="684" fill="#f1efe7" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">10.x ClusterIP</text>
      <text x="500" y="684" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Standard 默认</text>
      <text x="720" y="684" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">kube-dns/CoreDNS</text>
      <text x="900" y="684" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">kube-dns records</text>

      <!-- Legend -->
      <line x1="40" y1="524" x2="1060" y2="524" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <text x="40" y="540" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
      <rect x="40" y="548" width="24" height="12" rx="6" fill="rgba(241,239,231,0.03)" stroke="rgba(241,239,231,0.30)" stroke-width="1"/>
      <text x="72" y="558" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Start</text>
      <polygon points="156,554 168,548 180,554 168,560" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="192" y="558" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Decision</text>
      <line x1="296" y1="556" x2="324" y2="556" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="332" y="558" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">NodeLocal path</text>
      <line x1="464" y1="556" x2="492" y2="556" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="500" y="558" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Common path</text>
    </svg>
  </div>
</body>
</html>
