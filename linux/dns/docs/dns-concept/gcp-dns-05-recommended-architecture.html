<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recommended VPC DNS Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #1c1a17;
      --color-paper-2: #2a2723;
      --color-ink:     #f1efe7;
      --color-muted:   #a8a69d;
      --color-accent:  #ff6a30;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · VPC DNS</p>
    <h1>推荐架构 — VPC2 Peering Zone → VPC1 → 企业 DNS</h1>

    <svg viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(241,239,231,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a8a69d"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff6a30"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#1c1a17"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Arrows -->
      <!-- Pod → NodeLocal -->
      <line x1="220" y1="168" x2="220" y2="204" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- NodeLocal → Cloud DNS VPC2 -->
      <line x1="220" y1="252" x2="220" y2="288" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Cloud DNS VPC2 → Peering Zone -->
      <line x1="220" y1="336" x2="220" y2="372" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Peering Zone → VPC1 Cloud DNS (cross VPC) -->
      <line x1="280" y1="408" x2="400" y2="408" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- VPC1 Cloud DNS → Forwarding Zone -->
      <line x1="500" y1="408" x2="500" y2="444" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Forwarding Zone → Enterprise DNS -->
      <line x1="500" y1="492" x2="500" y2="528" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Enterprise DNS → Return -->
      <line x1="500" y1="576" x2="500" y2="600" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Labels -->
      <rect x="148" y="220" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="174" y="229" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ndots</text>
      <rect x="148" y="296" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="174" y="305" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">aibang.</text>
      <rect x="316" y="398" width="80" height="12" rx="2" fill="#1c1a17"/>
      <text x="356" y="407" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Peering Zone</text>
      <rect x="460" y="460" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="486" y="469" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">forward</text>
      <rect x="460" y="544" width="52" height="12" rx="2" fill="#1c1a17"/>
      <text x="486" y="553" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">35.199/19</text>
      <rect x="476" y="596" width="48" height="12" rx="2" fill="#1c1a17"/>
      <text x="500" y="605" fill="#ff6a30" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">A记录</text>

      <!-- GKE Pod in VPC2 (left, focal) -->
      <rect x="80" y="132" width="200" height="88" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="180" y="164" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GKE Pod in VPC2</text>
      <text x="180" y="180" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">nameserver 169.254.20.10</text>
      <text x="180" y="192" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ndots:5 / search path</text>
      <text x="180" y="204" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">query: api.teamname.aibang.</text>

      <!-- NodeLocal DNSCache -->
      <rect x="80" y="204" width="280" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="220" y="228" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">NodeLocal DNSCache</text>
      <text x="220" y="242" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">169.254.20.10 · 节点级缓存</text>

      <!-- Cloud DNS VPC2 -->
      <rect x="80" y="288" width="280" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="220" y="312" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">VPC2 Cloud DNS</text>
      <text x="220" y="326" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">name resolution order → Peering Zone</text>

      <!-- VPC2 Peering Zone (coral focal) -->
      <rect x="80" y="372" width="280" height="72" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="220" y="400" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">VPC2 Peering Zone</text>
      <text x="220" y="416" fill="#ff6a30" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">zone: aibang. → target: VPC1</text>
      <text x="220" y="428" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">DNS Peering ≠ VPC Network Peering</text>

      <!-- VPC1 Cloud DNS -->
      <rect x="400" y="372" width="200" height="72" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="500" y="400" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">VPC1 Cloud DNS</text>
      <text x="500" y="416" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">VPC1 name resolution order</text>
      <text x="500" y="428" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">cluster scope → VPC scope</text>

      <!-- VPC1 Forwarding Zone -->
      <rect x="400" y="444" width="200" height="48" rx="6" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="500" y="468" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">VPC1 Forwarding Zone</text>
      <text x="500" y="482" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">aibang. → target: 企业 DNS</text>

      <!-- Enterprise DNS -->
      <rect x="400" y="528" width="200" height="72" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="500" y="556" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Enterprise DNS</text>
      <text x="500" y="572" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">source: 35.199.192.0/19</text>
      <text x="500" y="584" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">TCP/UDP 53</text>

      <!-- Return A/AAAA/CNAME (right side) -->
      <rect x="680" y="500" width="160" height="60" rx="8" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="760" y="530" fill="#f1efe7" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">返回 Answer</text>
      <text x="760" y="546" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">A / AAAA / CNAME</text>

      <!-- Return arrow -->
      <line x1="600" y1="564" x2="680" y2="564" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

      <!-- VPC boundaries -->
      <!-- VPC2 dashed boundary -->
      <rect x="40" y="100" width="380" height="380" rx="8" fill="none" stroke="rgba(241,239,231,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="60" y="124" fill="#a8a69d" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.12em">VPC2 · GKE</text>

      <!-- VPC1 dashed boundary -->
      <rect x="360" y="340" width="300" height="300" rx="8" fill="none" stroke="rgba(241,239,231,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="380" y="364" fill="#a8a69d" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.12em">VPC1 · DNS Producer</text>

      <!-- Enterprise DNS boundary -->
      <rect x="360" y="500" width="300" height="80" rx="8" fill="none" stroke="rgba(241,239,231,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="380" y="524" fill="#a8a69d" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.12em">Enterprise / On-Prem</text>

      <!-- Key points section (right bottom) -->
      <rect x="680" y="100" width="380" height="160" rx="8" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="870" y="128" fill="#f1efe7" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">架构要点</text>
      <line x1="700" y1="140" x2="1040" y2="140" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <text x="700" y="160" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace">① VPC2 不直接承载企业 DNS forwarding target</text>
      <text x="700" y="178" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace">② VPC1 集中管理 aibang. forwarding target</text>
      <text x="700" y="196" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace">③ DNS Peering ≠ VPC Network Peering (独立能力)</text>
      <text x="700" y="214" fill="#ff6a30" font-size="9" font-family="'Geist Mono', monospace">④ forwarding source: 35.199.192.0/19 (非 169.254)</text>
      <text x="700" y="232" fill="#a8a69d" font-size="9" font-family="'Geist Mono', monospace">⑤ 应用侧用尾部点 FQDN 避免 search path 放大</text>

      <!-- Legend -->
      <line x1="40" y1="520" x2="1060" y2="520" stroke="rgba(241,239,231,0.10)" stroke-width="0.8"/>
      <text x="40" y="536" fill="#a8a69d" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
      <rect x="40" y="544" width="24" height="12" rx="2" fill="#2a2723" stroke="#f1efe7" stroke-width="1"/>
      <text x="72" y="554" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Component</text>
      <rect x="180" y="544" width="24" height="12" rx="2" fill="rgba(255,106,48,0.08)" stroke="#ff6a30" stroke-width="1.2"/>
      <text x="212" y="554" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Focal node</text>
      <line x1="328" y1="552" x2="356" y2="552" stroke="#ff6a30" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="364" y="554" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Primary path</text>
      <line x1="500" y1="552" x2="528" y2="552" stroke="#a8a69d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="536" y="554" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">Branch path</text>
      <rect x="688" y="544" width="24" height="12" rx="2" fill="none" stroke="rgba(241,239,231,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="720" y="554" fill="#a8a69d" font-size="8.5" font-family="'Geist', sans-serif">VPC boundary</text>
    </svg>
  </div>
</body>
</html>
